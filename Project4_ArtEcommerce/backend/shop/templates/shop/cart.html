<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Your Basket | Shop</title>
    <meta name="description" content="Review items in your basket and proceed to checkout.">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #fafafa;
            color: #222;
        }

        header {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #e6e6e6;
            text-align: left;
        }

        th {
            background: #f5f5f5;
        }

        input[type="number"] {
            padding: 6px;
            width: 70px;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .button {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .primary {
            background: #111;
            color: white;
        }

        .secondary {
            background: #e6e6e6;
            color: #111;
        }

        .checkout-button {
            background: #1a8917;
            color: white;
        }

        .empty {
            padding: 20px;
            background: white;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<header>
    <h1>Your Basket</h1>
</header>

<main>

{% if products %}

<form method="post" aria-label="Basket update form">
    {% csrf_token %}

    <table aria-describedby="basket-total">
        <thead>
            <tr>
                <th scope="col">Product</th>
                <th scope="col">Price</th>
                <th scope="col">Quantity</th>
                <th scope="col">Total</th>
            </tr>
        </thead>

        <tbody>
        {% for product in products %}
            <tr>
                <td>{{ product.title }}</td>
                <td>£{{ product.price }}</td>

                <td>
                    <label class="sr-only" for="qty_{{ product.id }}">
                        Quantity for {{ product.title }}
                    </label>

                    <input
                        id="qty_{{ product.id }}"
                        type="number"
                        name="qty_{{ product.id }}"
                        value="{{ product.quantity }}"
                        min="0"
                        inputmode="numeric"
                    >
                </td>

                <td>£{{ product.total_price }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

    <div class="actions">
        <button type="submit" class="button primary">
            Update Basket
        </button>

        <a href="{% url 'checkout' %}" class="button checkout-button">
            Checkout
        </a>

        <a href="{% url 'product_list' %}" class="button secondary">
            Continue shopping
        </a>
    </div>

</form>

<h2 id="basket-total">Total: £{{ total }}</h2>

{% else %}

<div class="empty" role="status">
    <p>Your basket is empty.</p>
    <a href="{% url 'product_list' %}" class="button primary">
        Start shopping
    </a>
</div>

{% endif %}

</main>

</body>
</html>
